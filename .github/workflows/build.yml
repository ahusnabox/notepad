name: Build Notepad EXE

# Jalankan otomatis setiap ada perubahan, dan bisa juga dijalankan manual
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Ambil kode
        uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pasang PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Bangun executable
        run: python -m PyInstaller --onefile --windowed --name notepad notepad.py

      - name: Unggah hasil (notepad.exe)
        uses: actions/upload-artifact@v4
        with:
          name: notepad-exe
          path: dist/notepad.exe
